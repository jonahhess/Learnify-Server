name: Build client and update server

on:
  push:
    branches:
      - main

jobs:
  build-and-copy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout client
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Checkout server repo
        uses: actions/checkout@v4
        with:
          repository: jonahhess/learnify-server
          token: ${{ secrets.MODIFY_LEARNIFY_SERVER }}
          path: server

      - name: Replace dist
        run: |
          rm -rf server/dist
          cp -R dist server/dist

      - name: Commit changes
        run: |
          cd server

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add dist

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update frontend build"
            git push
          fi
